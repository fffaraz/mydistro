DEFAULT live
TIMEOUT 50
PROMPT 0
ONTIMEOUT live

UI vesamenu.c32
MENU TITLE Boot
MENU CLEAR

LABEL live
	MENU LABEL Live Linux
	LINUX /bzImage
	APPEND initrd=/initramfs.cpio.gz
	# console=ttyS0

LABEL memtest
	MENU LABEL Memtest86+
	LINUX /mt86plus

LABEL hdt
	MENU LABEL Hardware Info
	COM32 hdt.c32

LABEL reboot
	MENU LABEL Reboot
	COM32 reboot.c32

LABEL poweroff
	MENU LABEL Power Off
	COM32 poweroff.c32
